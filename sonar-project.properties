sonar.projectKey=starter
sonar.projectName=Starter
sonar.sourceEncoding=UTF-8

# Analyze app + package source; test files are classified as tests below.
sonar.sources=apps,packages
sonar.tests=apps,packages
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Keep generated / non-source files out of analysis.
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/.turbo/**,**/*.config.ts,**/*.config.js,**/e2e/**,**/*.d.ts,**/vite-env.d.ts

# Merge per-workspace coverage into the quality gate.
sonar.javascript.lcov.reportPaths=packages/utils/coverage/lcov.info,packages/api-client/coverage/lcov.info,apps/web/coverage/lcov.info
