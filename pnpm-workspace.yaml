packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@rfdtech/components': true

minimumReleaseAgeExclude:
  - '@rfdtech/components@2.0.1'

# Allow only trusted dependencies to run install/build scripts (pnpm 11+).
# @rfdtech/components' postinstall wires its MCP dev-tooling (component search, etc.).
onlyBuiltDependencies:
  - esbuild
  - '@rfdtech/components'

patchedDependencies:
  '@rfdtech/components@2.0.1': patches/@rfdtech__components@2.0.1.patch

overrides:
  # SheetJS stopped publishing to the npm registry at 0.18.5, which carries a
  # high-severity prototype-pollution advisory (fixed in >=0.19.3). Patched
  # builds ship from the vendor CDN only, so the audit gate needs this
  # override until @rfdtech/components drops or revendors its xlsx peer.
  xlsx: 'https://cdn.sheetjs.com/xlsx-0.20.3/xlsx-0.20.3.tgz'
