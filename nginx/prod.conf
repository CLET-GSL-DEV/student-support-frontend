server {
    listen 80;
    server_name _;
    root  /usr/share/nginx/html;
    index index.html;

    # ── Compression ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm font/woff2;

    # ── Same-origin API proxy to the System-17 gateway ───────────────────────────
    # The SPA calls /api/* same-origin (the gateway sends no CORS headers, so a
    # cross-origin call would fail). Host MUST be $proxy_host (the gateway service),
    # NOT $host (the site host): APISIX matches host-specific routes first, so
    # forwarding the site host makes the gateway match THIS site's own <host>/*
    # catch-all and bounce /api/* back here -> loop -> 502.
    # API_UPSTREAM is env-substituted at container start (k8s injects the gateway svc).
    location /api/ {
        proxy_pass         ${API_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header   Host $proxy_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }

    # ── SPA routing ────────────────────────────────────────────────────────────
    # All routes serve index.html so the client router handles navigation
    # (including /auth/callback and /auth/logout/callback for the OIDC flow).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ───────────────────────────────────────────────────
    # Vite fingerprints asset filenames, so they are safe to cache indefinitely.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }
}
