name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '31 4 * * 1'

permissions:
  contents: read
  security-events: write
  # codeql-action needs to read workflow-run metadata for its status
  # reporting; without this the analyze step fails with "Resource not
  # accessible by integration".
  actions: read

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    # Code scanning needs the org to enable Code Security (GitHub Advanced
    # Security) on this private repository; until then the SARIF upload is
    # rejected. Remove continue-on-error once Code Security is enabled so
    # real findings fail the check again.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
