name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  # Manual escape hatch: build + push on demand (e.g. if a push event to dev
  # is dropped). Trigger from the Actions UI or `gh workflow run`.
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    env:
      # Hoisted so the `if:` guards below can detect whether Sonar is configured.
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          # SonarQube needs full history for accurate new-code detection.
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (with coverage)
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  security-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Audit (fail on high/critical)
        run: pnpm audit --audit-level=high

  docker:
    name: Build and push image
    needs: [verify, security-audit]
    runs-on: ubuntu-latest
    # Publish only from a real push to dev (not PRs), matching the platform
    # convention. workflow_dispatch allows a manual rebuild.
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/dev') }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # argocd-image-updater tracks the :dev tag (digest-pinned on the ArgoCD app).
      # Cluster Zitadel values are baked in at build time (Vite inlines VITE_*).
      # This app owns its own /auth/callback, so its redirect URIs use the cluster
      # host and are registered on Zitadel project 382921651425116297 / client
      # 382921651592888457.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_ZITADEL_AUTHORITY=https://auth.uat.rfdgh.com
            VITE_ZITADEL_CLIENT_ID=382921651592888457
            VITE_ZITADEL_PROJECT_ID=382921651425116297
            VITE_ZITADEL_REDIRECT_URI=https://student-support.uat.rfdgh.com/auth/callback
            VITE_ZITADEL_POST_LOGOUT_URI=https://student-support.uat.rfdgh.com/auth/logout/callback
            VITE_SESSION_CHECK_ENABLED=true
            VITE_ADMIN_DATA_SOURCE=mock
            VITE_APP_ENV=production
          tags: |
            ghcr.io/clet-gsl-dev/student-support-frontend:dev
            ghcr.io/clet-gsl-dev/student-support-frontend:dev-${{ github.sha }}
            ghcr.io/clet-gsl-dev/student-support-frontend:latest
