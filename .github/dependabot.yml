version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk updates to reduce PR noise.
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      production-minor-patch:
        dependency-type: production
        update-types: [minor, patch]
    commit-message:
      prefix: 'chore(deps)'

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    commit-message:
      prefix: 'chore(ci)'
